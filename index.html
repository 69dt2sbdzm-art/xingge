<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>谁是卧底 - 单机版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }
    .page { min-height: 100vh; display: flex; flex-direction: column; }
    .header { text-align: center; padding: 20px 0; }
    .header h1 { font-size: 28px; background: linear-gradient(90deg, #22d3ee, #e879f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(34, 211, 238, 0.3); border-radius: 16px; padding: 24px; margin-bottom: 16px; }
    .btn { display: block; width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; text-align: center; }
    .btn-primary { background: linear-gradient(135deg, #22d3ee 0%, #0891b2 100%); color: #000; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #22d3ee; border: 1px solid rgba(34, 211, 238, 0.3); }
    .input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid rgba(34, 211, 238, 0.3); background: rgba(255,255,255,0.05); color: #fff; font-size: 16px; margin-bottom: 12px; }
    .room-code { text-align: center; font-size: 48px; color: #22d3ee; letter-spacing: 8px; margin: 20px 0; font-weight: bold; }
    .word-display { text-align: center; padding: 40px 20px; }
    .word-display h2 { font-size: 42px; color: #22d3ee; margin: 20px 0; }
    .hidden { display: none !important; }
    .player-item { display: flex; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="home-page" class="page">
      <div class="header">
        <h1>🕵️ WHO'S THE SPY?</h1>
        <p style="color:#9ca3af">单机版 - 同一设备轮流玩</p>
      </div>
      <div class="card">
        <input type="text" id="player-name" class="input" placeholder="输入你的名字" maxlength="20">
        <button class="btn btn-primary" onclick="createRoom()">🏠 创建房间</button>
        <button class="btn btn-secondary" onclick="showJoin()">🔑 加入房间</button>
      </div>
    </div>

    <div id="join-page" class="page hidden">
      <div class="header"><h1>加入房间</h1></div>
      <div class="card">
        <input type="text" id="join-name" class="input" placeholder="你的名字">
        <input type="text" id="join-code" class="input" placeholder="房间号" maxlength="4">
        <button class="btn btn-primary" onclick="joinRoom()">🚀 加入</button>
        <button class="btn btn-secondary" onclick="showPage('home-page')">← 返回</button>
      </div>
    </div>

    <div id="room-page" class="page hidden">
      <div class="header"><h1>房间</h1></div>
      <div class="card">
        <p style="color:#9ca3af;text-align:center">房间号</p>
        <div class="room-code" id="display-room-code">----</div>
        <div id="room-players"></div>
      </div>
      <div class="card">
        <button class="btn btn-primary" onclick="startGame()" id="start-btn">🎮 开始游戏</button>
        <button class="btn btn-secondary" onclick="showPage('home-page')">🏠 返回</button>
      </div>
    </div>

    <div id="game-page" class="page hidden">
      <div class="header"><h1>你的词语</h1></div>
      <div class="card">
        <div class="word-display">
          <p style="color:#e879f9;font-size:18px" id="game-role">---</p>
          <h2 id="game-word">---</h2>
        </div>
      </div>
      <div class="card" id="judge-panel" style="display:none">
        <h3 style="color:#22d3ee">👨‍⚖️ 法官面板</h3>
        <div id="judge-players"></div>
      </div>
      <div class="card">
        <button class="btn btn-primary" onclick="nextPlayer()">➡️ 下一个玩家</button>
        <button class="btn btn-secondary" onclick="showPage('room-page')">← 返回</button>
      </div>
    </div>
  </div>

  <script>
    let gameData = { rooms: {}, currentRoom: null, currentPlayer: null, isHost: false, currentPlayerIndex: 0 };
    const wordPairs = [
      { civilian: 'Apple/苹果', spy: 'Orange/橙子' },
      { civilian: 'Dog/狗', spy: 'Cat/猫' },
      { civilian: 'Milk Tea/奶茶', spy: 'Coffee/咖啡' },
      { civilian: 'Summer/夏天', spy: 'Winter/冬天' },
      { civilian: 'Teacher/老师', spy: 'Professor/教授' },
      { civilian: 'Pizza/披萨', spy: 'Burger/汉堡' },
      { civilian: 'Beach/海滩', spy: 'Pool/泳池' },
      { civilian: 'Phone/手机', spy: 'Computer/电脑' },
    ];

    function generateCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
      return code;
    }

    function createRoom() {
      const name = document.getElementById('player-name').value.trim();
      if (!name) { alert('请输入名字'); return; }
      const roomCode = generateCode();
      const wordPair = wordPairs[Math.floor(Math.random() * wordPairs.length)];
      gameData.rooms[roomCode] = { players: [{ name, role: 'judge', word: 'ALL WORDS', isHost: true }], wordPair, status: 'waiting' };
      gameData.currentRoom = roomCode; gameData.currentPlayer = name; gameData.isHost = true;
      document.getElementById('display-room-code').textContent = roomCode;
      updatePlayerList(); showPage('room-page');
    }

    function joinRoom() {
      const name = document.getElementById('join-name').value.trim();
      const code = document.getElementById('join-code').value.trim().toUpperCase();
      if (!name || !code) { alert('请填写完整信息'); return; }
      const room = gameData.rooms[code];
      if (!room) { alert('房间不存在'); return; }
      if (room.players.length >= 8) { alert('房间已满'); return; }
      room.players.push({ name, role: null, word: null, isHost: false });
      gameData.currentRoom = code; gameData.currentPlayer = name; gameData.isHost = false;
      document.getElementById('display-room-code').textContent = code;
      updatePlayerList(); showPage('room-page');
    }

    function updatePlayerList() {
      const room = gameData.rooms[gameData.currentRoom];
      if (!room) return;
      document.getElementById('room-players').innerHTML = room.players.map(p => 
        `<div class="player-item"><span>${p.name}</span><span style="color:${p.role==='judge'?'#22d3ee':p.role==='spy'?'#e879f9':'#9ca3af'}">${p.role?p.role.toUpperCase():'WAITING'}</span></div>`
      ).join('');
    }

    function startGame() {
      const room = gameData.rooms[gameData.currentRoom];
      if (!room || room.players.length < 3) { alert('需要至少3人'); return; }
      const nonJudge = room.players.filter(p => !p.isHost);
      const spyIndex = Math.floor(Math.random() * nonJudge.length);
      nonJudge.forEach((p, i) => { p.role = i === spyIndex ? 'spy' : 'civilian'; p.word = i === spyIndex ? room.wordPair.spy : room.wordPair.civilian; });
      room.status = 'playing'; gameData.currentPlayerIndex = 0; showGamePage();
    }

    function showGamePage() {
      const room = gameData.rooms[gameData.currentRoom];
      const me = room.players[gameData.currentPlayerIndex];
      document.getElementById('game-role').textContent = me.role.toUpperCase();
      document.getElementById('game-role').style.color = me.role === 'judge' ? '#22d3ee' : me.role === 'spy' ? '#e879f9' : '#a855f7';
      document.getElementById('game-word').textContent = me.word;
      document.getElementById('judge-panel').style.display = me.role === 'judge' ? 'block' : 'none';
      if (me.role === 'judge') {
        document.getElementById('judge-players').innerHTML = room.players.map(p => 
          `<div class="player-item"><span>${p.name}</span><span style="color:#9ca3af">${p.word}</span></div>`
        ).join('');
      }
      showPage('game-page');
    }

    function nextPlayer() {
      const room = gameData.rooms[gameData.currentRoom];
      gameData.currentPlayerIndex = (gameData.currentPlayerIndex + 1) % room.players.length;
      const nextP = room.players[gameData.currentPlayerIndex];
      alert(`请把设备交给: ${nextP.name}`);
      showGamePage();
    }

    function showJoin() { document.getElementById('join-name').value = document.getElementById('player-name').value.trim(); showPage('join-page'); }
    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
  </script>
</body>
</html>
